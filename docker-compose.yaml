version: "3.8"

services:
  synology-to-telegram:
    container_name: synology-to-telegram
    restart: unless-stopped

    ports:
      - "7878:7878"

    # Credentials and required settings go in .env (see .env.example).
    env_file:
      - .env

    environment:
      # ── Optional overrides ───────────────────────────────────────────────
      # Uncomment and set WEBHOOK_SECRET to protect the /webhookcam endpoint.
      # Generate a value with: python3 -c "import secrets; print(secrets.token_hex(32))"
      # Configure the same value in Synology → Action Rules → HTTP header:
      #   X-Webhook-Token: <your-secret>
      # - WEBHOOK_SECRET=

      - CONFIG_FILE=/bot/syno_cam_config.json
      - VIDEO_FILE=/bot/temp.mp4
      - VIDEO_SEGMENT_DURATION=10000   # milliseconds (10 s per segment)
      - WEBHOOK_TIMEOUT=5              # seconds to wait before fetching video
      - API_TIMEOUT=30                 # seconds — Synology JSON API timeout
      - VIDEO_DOWNLOAD_TIMEOUT=90      # seconds — binary video download timeout
      - LOG_LEVEL=INFO
      # workers must stay 1 — in-process state is not fork-safe
      - GUNICORN_WORKERS=1
      - GUNICORN_TIMEOUT=120

    volumes:
      # Camera config cache and per-camera temp video files are written here.
      # Change the host path to a directory you control.
      - /home/test:/bot

    build:
      context: .
      dockerfile: Dockerfile
    # To use the pre-built image from GHCR instead of building locally:
    # image: ghcr.io/admake/synology-ss-video-to-telegram-with-prerecording:main

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request, json, sys; r = urllib.request.urlopen('http://localhost:7878/health', timeout=5); sys.exit(0 if json.loads(r.read()).get('status') == 'ok' else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
